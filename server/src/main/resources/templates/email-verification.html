<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body style="font-family: Arial, sans-serif; padding: 20px; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; border: 1px solid #ddd; padding: 20px; border-radius: 8px;">
        
        <h2 style="color: #007bff;">Welcome to anyPost, <span th:text="${name}">User</span>!</h2>
        
        <p>We are excited to have you on board. Please verify your email address to activate your account and start posting.</p>
        
        <div style="text-align: center; margin: 30px 0;">
            <a th:href="${link}" style="background-color: #007bff; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: bold;">
                Verify My Email
            </a>
        </div>
        
        <p style="font-size: 12px; color: #777;">If you did not request this, please ignore this email.</p>
    </div>
</body>
</html>
